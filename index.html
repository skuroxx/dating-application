<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus C# Advanced Cloud IDE</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- RequireJS for Monaco Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <!-- FontAwesome for Intuitive Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Smooth transitions for theme switching */
        body, div, header, pre, select {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
    </style>
</head>
<body id="appBody" class="bg-[#0F1015] text-gray-200 min-h-screen flex flex-col font-sans select-none">

    <!-- TOP CONTROL NAVIGATION -->
    <header id="appHeader" class="border-b border-zinc-800 bg-[#16171D] px-6 py-4 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <div class="h-3 w-3 rounded-full bg-purple-500 animate-pulse"></div>
            <h1 class="text-xs font-mono tracking-[0.2em] text-zinc-400 uppercase font-bold">Nexus C# Engine</h1>
        </div>

        <!-- QUICK UTILITIES & ENGINE SNIPPETS -->
        <div class="flex items-center gap-3 flex-wrap">
            <!-- Template Selector -->
            <div class="flex items-center gap-2 bg-zinc-900/80 border border-zinc-800 rounded px-2.5 py-1.5">
                <i class="fa-solid fa-code text-xs text-purple-400"></i>
                <select id="snippetSelect" class="bg-transparent text-xs font-mono text-zinc-300 focus:outline-none cursor-pointer">
                    <option value="welcome">Template: Hello World</option>
                    <option value="loop">Template: Advanced Loops</option>
                    <option value="method">Template: Custom Classes</option>
                </select>
            </div>

            <!-- Theme Toggle Button -->
            <button id="themeToggleBtn" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 p-2.5 rounded text-xs flex items-center justify-center border border-zinc-700/50" title="Toggle UI Palette">
                <i id="themeIcon" class="fa-solid fa-sun text-amber-400"></i>
            </button>

            <!-- PRIMARY COMPILATION ENGINE TRIGGER -->
            <button id="compileBtn" class="bg-purple-600 hover:bg-purple-500 active:scale-95 text-white text-xs font-mono font-bold uppercase tracking-widest px-6 py-2.5 transition-all flex items-center gap-2 shadow-[0_0_15px_rgba(147,51,234,0.3)] rounded">
                <i class="fa-solid fa-play"></i> Run Application
            </button>
        </div>
    </header>

    <!-- MAIN IDE WORKSPACE WORKSPACE PANE -->
    <main class="flex-1 relative h-[calc(100vh-73px)] bg-[#0F1015]">
        <!-- Full Screen Monaco Frame -->
        <div id="editorContainer" class="w-full h-full"></div>
    </main>

    <!-- DEDICATED EXECUTION OUTPUT WINDOW MODAL OVERLAY -->
    <div id="terminalModal" class="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-[#0A0B0E] border border-zinc-800 w-full max-w-3xl h-[500px] rounded-lg shadow-2xl flex flex-col overflow-hidden scale-95 transition-transform duration-300">
            <!-- Modal Header Controls -->
            <div class="bg-[#121318] border-b border-zinc-800 px-5 py-3.5 flex items-center justify-between">
                <div class="flex items-center gap-2 text-xs font-mono text-zinc-400 font-bold uppercase tracking-wider">
                    <i class="fa-solid fa-terminal text-emerald-400"></i> Local Runtime Terminal Window
                </div>
                <button id="closeModalBtn" class="text-zinc-500 hover:text-white transition-colors p-1 text-sm">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <!-- Live Terminal Output Area -->
            <div class="flex-1 p-6 bg-black font-mono text-xs overflow-y-auto leading-relaxed select-text">
                <pre id="terminalOutput" class="whitespace-pre-wrap text-emerald-400 selection:bg-emerald-900"></pre>
            </div>
            <!-- Modal Actions Footer Bar -->
            <div class="bg-[#121318] border-t border-zinc-800 px-5 py-3 flex justify-end gap-2">
                <button id="clearLogBtn" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-zinc-200 text-xs font-mono rounded transition-colors">
                    Clear Logs
                </button>
                <button id="modalCloseAction" class="px-4 py-2 bg-purple-600 hover:bg-purple-500 text-white text-xs font-mono rounded transition-colors">
                    Return to Workspace
                </button>
            </div>
        </div>
    </div>

    <!-- SCRIPT APPLICATION CONFIGURATION -->
    <script>
        let editor;
        let isDarkMode = true;

        // Custom Template Snippets Bank
        const snippets = {
            welcome: `using System;\n\nnamespace LocalIDE\n{\n    public class Program\n    {\n        public static void Main(string[] args)\n        {\n            Console.WriteLine("Hello World! Welcome to your new streamlined C# IDE.");\n            Console.WriteLine("IntelliSense Suggestions are active below. Try typing 'Console.'");\n        }\n    }\n}`,
            loop: `using System;\n\nnamespace LoopDemo\n{\n    public class Program\n    {\n        public static void Main(string[] args)\n        {\n            string[] heroes = { "Batman", "Robin", "Nightwing", "Batgirl" };\n            \n            Console.WriteLine("Deploying Gotham Perimeter Defense Grid...");\n            foreach (var hero in heroes)\n            {\n                Console.WriteLine($"[ACTIVE PROTECTION] Vector secured by: {hero}");\n            }\n        }\n    }\n}`,
            method: `using System;\n\nnamespace ClassDemo\n{\n    public class Program\n    {\n        public static void Main(string[] args)\n        {\n            Calculators calc = new Calculators();\n            int results = calc.MultiplyValues(12, 12);\n            Console.WriteLine($"System Core Computation Result: {results}");\n        }\n    }\n\n    public class Calculators\n    {\n        public int MultiplyValues(int a, int b)\n        {\n            return a * b;\n        }\n    }\n}`
        };

        // Initialize Monaco Engine Architecture
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            
            // CONFIGURE INTELLISENSE AND CUSTOM AUTOCOMPLETE SUGGESTIONS
            monaco.languages.registerCompletionItemProvider('csharp', {
                provideCompletionItems: function(model, position) {
                    var word = model.getWordUntilPosition(position);
                    var range = {
                        startLineNumber: position.lineNumber,
                        endLineNumber: position.lineNumber,
                        startColumn: word.startColumn,
                        endColumn: word.endColumn
                    };
                    
                    // Custom IntelliSense Database arrays
                    const customSuggestions = [
                        { label: 'Console.WriteLine', kind: monaco.languages.CompletionItemKind.Method, insertText: 'Console.WriteLine("${1:message}");', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Prints data streams followed by a line terminator to standard output console.' },
                        { label: 'Console.ReadLine', kind: monaco.languages.CompletionItemKind.Method, insertText: 'Console.ReadLine();', documentation: 'Reads the next line of characters from the standard input stream.' },
                        { label: 'public static void Main', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'public static void Main(string[] args)\n{\n\t${1}\n}', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Standard application primary compiler execution entry structural block method.' },
                        { label: 'string.IsNullOrEmpty', kind: monaco.languages.CompletionItemKind.Method, insertText: 'string.IsNullOrEmpty(${1:variable})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Indicates whether the specified string is null or an empty string.' },
                        { label: 'Convert.ToInt32', kind: monaco.languages.CompletionItemKind.Method, insertText: 'Convert.ToInt32(${1:value})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet }
                    ];

                    return { suggestions: customSuggestions.map(item => ({ ...item, range: range })) };
                }
            });

            // Spin Up Workspace Editor Container Instance
            editor = monaco.editor.create(document.getElementById('editorContainer'), {
                value: snippets.welcome,
                language: 'csharp',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                fontFamily: 'Consolas, Fira Code, monospace',
                minimap: { enabled: true },
                snippetSuggestions: 'inline',
                wordBasedSuggestions: true,
                suggestOnTriggerCharacters: true
            });
        });

        // MODAL MANAGEMENT WINDOW PIPELINE LOGIC
        const terminalModal = document.getElementById('terminalModal');
        const modalInner = terminalModal.querySelector('div');
        const terminalOutput = document.getElementById('terminalOutput');

        function openTerminalWindow() {
            terminalModal.classList.remove('hidden');
            setTimeout(() => {
                terminalModal.classList.remove('opacity-0');
                modalInner.classList.remove('scale-95');
            }, 10);
        }

        function closeTerminalWindow() {
            terminalModal.classList.add('opacity-0');
            modalInner.classList.add('scale-95');
            setTimeout(() => {
                terminalModal.classList.add('hidden');
            }, 300);
        }

        document.getElementById('closeModalBtn').addEventListener('click', closeTerminalWindow);
        document.getElementById('modalCloseAction').addEventListener('click', closeTerminalWindow);
        document.getElementById('clearLogBtn').addEventListener('click', () => terminalOutput.innerText = "[Console Reset Cache Cleared]");

        // EXECUTING THE COMPILER CORE ACTIONS
        document.getElementById('compileBtn').addEventListener('click', async () => {
            // Instantly open the runtime separate terminal display view window
            openTerminalWindow();
            terminalOutput.innerText = ">> Establishing pipeline stream communication parameters...\n>> Transmitting file buffer bytes to compilation grid API...\n\nRunning standard checks...\n";
            terminalOutput.className = "text-amber-500 whitespace-pre-wrap";

            try {
                const response = await fetch('https://api.codex.jaagrav.in', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        language: 'cs',
                        code: editor.getValue()
                    })
                });

                const data = await response.json();

                if (data.output && data.output !== "") {
                    terminalOutput.innerText = `[Process Completed Successfully]\n\n${data.output}`;
                    terminalOutput.className = "text-emerald-400 whitespace-pre-wrap";
                } else if (data.error && data.error !== "") {
                    terminalOutput.innerText = `[Process Terminated - Trace Crash Error Flags Exception]\n\n${data.error}`;
                    terminalOutput.className = "text-red-400 whitespace-pre-wrap font-bold";
                } else {
                    terminalOutput.innerText = "[Process Completed] Runtime execution successfully resolved with zero context printed arrays output.";
                    terminalOutput.className = "text-zinc-400 italic whitespace-pre-wrap";
                }
            } catch (err) {
                terminalOutput.innerText = `CRITICAL INTERRUPT EXCEPTION:\nNetwork dropped connection during active data transmission loop.\nDetails: ${err.message}`;
                terminalOutput.className = "text-red-600 font-bold whitespace-pre-wrap";
            }
        });

        // MONITOR QUICK SNIPPET DRIVER INJECTORS
        document.getElementById('snippetSelect').addEventListener('change', (e) => {
            const selectedKey = e.target.value;
            if(snippets[selectedKey]) {
                editor.setValue(snippets[selectedKey]);
            }
        });

        // GRAPHICS LIGHT/DARK PALETTE MASTER CONTROLLER
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            const appBody = document.getElementById('appBody');
            const appHeader = document.getElementById('appHeader');
            const themeIcon = document.getElementById('themeIcon');
            const snippetSelect = document.getElementById('snippetSelect');

            if(isDarkMode) {
                monaco.editor.setTheme('vs-dark');
                appBody.className = "bg-[#0F1015] text-gray-200 min-h-screen flex flex-col font-sans select-none";
                appHeader.className = "border-b border-zinc-800 bg-[#16171D] px-6 py-4 flex flex-wrap items-center justify-between gap-4";
                themeIcon.className = "fa-solid fa-sun text-amber-400";
                snippetSelect.parentElement.className = "flex items-center gap-2 bg-zinc-900/80 border border-zinc-800 rounded px-2.5 py-1.5";
            } else {
                monaco.editor.setTheme('vs-light');
                appBody.className = "bg-zinc-50 text-zinc-900 min-h-screen flex flex-col font-sans select-none";
                appHeader.className = "border-b border-zinc-200 bg-white px-6 py-4 flex flex-wrap items-center justify-between gap-4 shadow-sm";
                themeIcon.className = "fa-solid fa-moon text-indigo-600";
                snippetSelect.parentElement.className = "flex items-center gap-2 bg-zinc-100 border border-zinc-300 rounded px-2.5 py-1.5";
            }
        });
    </script>
</body>
</html>
